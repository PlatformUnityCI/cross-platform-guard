name: PR Governance

on:
  workflow_call:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  pr-governance:
    runs-on: ubuntu-latest

    steps:
      - name: Read PR context
        id: pr_context
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.setFailed("No pull_request context found.");
              return;
            }

            core.setOutput("number", String(pr.number));
            core.setOutput("title", pr.title);

      - name: List changed files from PR
        id: files
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.setFailed("No pull_request context found.");
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100
            });

            const filenames = files.map(f => f.filename);

            const engineChanged = filenames.some(name => name.startsWith("lib/ai_review/"));
            const workflowChanged = filenames.some(name => name.startsWith(".github/workflows/"));
            const docsChanged = filenames.some(name => name === "README.md" || name.startsWith("docs/"));

            core.setOutput("engine_changed", String(engineChanged));
            core.setOutput("workflow_changed", String(workflowChanged));
            core.setOutput("docs_changed", String(docsChanged));
            core.setOutput("filenames", JSON.stringify(filenames));

      - name: Apply labels
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.setFailed("No pull_request context found.");
              return;
            }

            const labels = [];
            if ("${{ steps.files.outputs.engine_changed }}" === "true") labels.push("engine");
            if ("${{ steps.files.outputs.workflow_changed }}" === "true") labels.push("workflow");
            if ("${{ steps.files.outputs.docs_changed }}" === "true") labels.push("documentation");

            if (labels.length === 0) {
              core.notice("No matching labels to apply.");
              return;
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels
            });

      - name: Suggest PR title
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.setFailed("No pull_request context found.");
              return;
            }

            const title = pr.title;
            const marker = "<!-- pr-title-suggester -->";

            const engineChanged = "${{ steps.files.outputs.engine_changed }}" === "true";
            const workflowChanged = "${{ steps.files.outputs.workflow_changed }}" === "true";
            const docsChanged = "${{ steps.files.outputs.docs_changed }}" === "true";

            let suggestedPrefix = null;
            let reason = null;

            if (engineChanged) {
              suggestedPrefix = "feat:";
              reason = "changes detected in lib/ai_review/**";
            } else if (workflowChanged) {
              suggestedPrefix = "chore:";
              reason = "changes detected in .github/workflows/**";
            } else if (docsChanged) {
              suggestedPrefix = "docs:";
              reason = "documentation-only changes detected";
            }

            if (!suggestedPrefix) {
              core.notice("No suggestion rule matched.");
              return;
            }

            const cleanedTitle = title.replace(/^(feat:|fix:|docs:|chore:|refactor:|perf:)\s*/i, "").trim();

            const body = `${marker}
            ## 🏷️ PR Title Suggestion

            Suggested prefix: \`${suggestedPrefix}\`

            **Reason:** ${reason}

            **Suggested title example**
            \`${suggestedPrefix} ${cleanedTitle}\``;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number
            });

            const existing = comments.find(c =>
              c.user.type === "Bot" && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body
              });
            }

      - name: Validate PR title
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.setFailed("No pull_request context found.");
              return;
            }

            const title = pr.title;

            const engineChanged = "${{ steps.files.outputs.engine_changed }}" === "true";
            const workflowChanged = "${{ steps.files.outputs.workflow_changed }}" === "true";
            const docsChanged = "${{ steps.files.outputs.docs_changed }}" === "true";

            let expected = null;

            if (engineChanged) {
              expected = "feat:";
            } else if (workflowChanged) {
              expected = "chore:";
            } else if (docsChanged) {
              expected = "docs:";
            }

            if (!expected) {
              core.notice("No title rule matched. Skipping validation.");
              return;
            }

            if (!title.startsWith(expected)) {
              core.setFailed(`PR title must start with "${expected}". Current title: "${title}"`);
            } else {
              core.notice(`Valid PR title: ${title}`);
            }
