name: QA Engine

on:
  workflow_call:
    inputs:
      language:
        required: true
        type: string
      pytest_mark:
        required: false
        type: string
        default: regression

permissions:
  contents: read
  pull-requests: write
  checks: write
  issues: write

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v6

      - name: Set up Python
        if: inputs.language == 'python'
        uses: actions/setup-python@v6
        with:
          python-version: 3.12.0

      - name: Install dependencies (Python)
        if: inputs.language == 'python'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -I

      - name: Run tests (Python)
        if: inputs.language == 'python'
        run: |
          mkdir -p report
          pytest -m ${{ inputs.pytest_mark }} \
            --junitxml=report/junit.xml \
            --html=report/html-report.html \
            --self-contained-html

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: report

  ai-review:
    runs-on: ubuntu-latest
    needs: run-tests

    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: |
          git fetch origin +refs/heads/${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD > pr.diff

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12.0

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate AI findings
        run: python lib_core/ai_review/analyze_pr.py pr.diff > comments.json

      - name: Generate PR summary
        run: python lib_core/ai_review/summarize_pr.py pr.diff > summary.md

      - name: Post inline review comments
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');

            const comments = JSON.parse(fs.readFileSync('comments.json', 'utf8'));

            if (!comments.length) return;

            const commit_id = context.payload.pull_request.head.sha;

            const reviewComments = comments
              .filter(c => c.path && c.line)
              .map(c => ({
                path: c.path,
                line: c.line,
                body: `${c.icon || "🟢"} ${(c.severity || "low").toUpperCase()}(${c.score || 1}) → ${c.body || "No description"}`
              }));

            if (!reviewComments.length) return;

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              commit_id,
              event: "COMMENT",
              comments: reviewComments
            });
