name: QA Engine

on:
  workflow_call:
    inputs:
      language:
        type: string
      pytest_mark:
        required: false
        type: string
        default: regression
    secrets:
      CROSS_PLATFORM_GUARD_TOKEN:
        required: false

  pull_request:
    branches: [ "main" ]
    types: [ opened, synchronize, reopened, edited ]
    
permissions:
  contents: read
  pull-requests: write
  checks: write
  issues: write

jobs:  
  ai-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: |
          echo "Base SHA: ${{ github.event.pull_request.base.sha }}"
          echo "Head SHA: ${{ github.sha }}"
      
          git fetch origin ${{ github.event.pull_request.base.ref }}
      
          git diff ${{ github.event.pull_request.base.sha }}...${{ github.sha }} > pr.diff

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12.0

      - name: Define QA Engine path
        run: |
          if [ "${{ github.repository }}" = "PlatformUnityCI/cross-platform-guard" ]; then
            echo "QA_ENGINE_PATH=." >> $GITHUB_ENV
          else
            echo "QA_ENGINE_PATH=qa-engine" >> $GITHUB_ENV
          fi

      - name: Checkout QA Engine
        if: github.repository != 'PlatformUnityCI/cross-platform-guard'
        uses: actions/checkout@v6
        with:
          repository: PlatformUnityCI/cross-platform-guard
          token: ${{ secrets.CROSS_PLATFORM_GUARD_TOKEN }}
          path: qa-engine
          
      # 🔥 JSON estructurado
      - name: Generate AI findings
        run: python $QA_ENGINE_PATH/lib/ai_review/analyze_pr.py pr.diff > comments.json
      
      - name: Generate PR summary
        run: python $QA_ENGINE_PATH/lib/ai_review/summarize_pr.py pr.diff > summary.md

      # 🧹 limpiar comentarios previos
      - name: Clean previous bot comments
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              console.log("⚠️ No PR context - skipping cleanup");
              return;
            }
      
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
            });
      
            for (const c of comments.data) {
              if (c.user.type === "Bot" && c.body.includes("QA AI Review")) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                });
              }
            }

      # 🧾 actualizar descripción
      - name: Update PR description
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
      
            const pr = context.payload.pull_request;
            if (!pr) {
              console.log("⚠️ No PR context - skipping PR description update");
              return;
            }
      
            const newSummary = fs.readFileSync('summary.md', 'utf8');
      
            let body = pr.body || '';
            const start = '<!-- AI SUMMARY START -->';
            const end = '<!-- AI SUMMARY END -->';
            const regex = new RegExp(`${start}[\\s\\S]*?${end}`, 'g');
      
            if (regex.test(body)) {
              body = body.replace(regex, newSummary);
            } else {
              body += "\n\n" + newSummary;
            }
      
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              body
            });

      # 💥 comentarios inline
      - name: Post inline review comments
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
      
            const pr = context.payload.pull_request;
            if (!pr) {
              console.log("⚠️ No PR context - skipping inline review comments");
              return;
            }
      
            const comments = JSON.parse(fs.readFileSync('comments.json', 'utf8'));
      
            if (comments.length === 0) return;
      
            const commit_id = pr.head.sha;
      
            const reviewComments = comments
              .filter(c => c.path && c.line)
              .map(c => {
                const severity = (c.severity || "low").toUpperCase();
                const score = c.score || 1;
                const icon = c.icon || "🟢";
      
                return {
                  path: c.path,
                  line: c.line,
                  body: `${icon} ${severity}(${score}) → ${c.body || "No description"}`
                };
              });
      
            if (reviewComments.length === 0) return;
      
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              commit_id,
              event: "COMMENT",
              comments: reviewComments
            });
      
            if (comments.some(c => c.severity === "high")) {
              core.setFailed("🔴 High severity issues detected");
            }

      # 📊 crear issues agrupados
      - name: Create grouped issues
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
      
            const pr = context.payload.pull_request;
            if (!pr) {
              console.log("⚠️ No PR context - skipping issue creation");
              return;
            }
      
            if (pr.head.repo.fork) {
              console.log("⚠️ Fork detected - skipping issue creation");
              return;
            }
      
            const comments = JSON.parse(fs.readFileSync('comments.json', 'utf8'));
            const ISSUE_SEVERITIES = ["medium", "high"];
      
            const filtered = comments.filter(c => {
              const severity = (c.severity || "").toLowerCase();
      
              return (
                c.path &&
                !c.path.includes("test") &&
                ISSUE_SEVERITIES.includes(severity)
              );
            });
      
            const grouped = {};
            for (const c of filtered) {
              if (!grouped[c.path]) grouped[c.path] = [];
              grouped[c.path].push(c);
            }
      
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open"
            });
      
            for (const file in grouped) {
              const title = `[QA] Issues en ${file}`;
      
              const exists = existing.data.some(i => i.title === title);
              if (exists) continue;
      
              let body = `Archivo: ${file}\n\n`;
      
              for (const i of grouped[file]) {
                const severity = (i.severity || "low").toUpperCase();
                const score = i.score || 1;
                const icon = i.icon || "🟢";
                const line = i.line || "?";
                const text = i.body || "No description";
      
                body += `- ${icon} ${severity}(${score}) → Línea ${line}: ${text}\n`;
              }
      
              body += `\n🔗 PR: ${pr.html_url}`;
      
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body
              });
            }
            
      # 🧹 cerrar issues resueltos automáticamente
      - name: Close resolved issues
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
      
            const pr = context.payload.pull_request;
            if (!pr) {
              console.log("⚠️ No PR context - skipping issue closing");
              return;
            }
      
            if (pr.head.repo.fork) {
              console.log("⚠️ Fork detected - skipping issue closing");
              return;
            }
      
            const comments = JSON.parse(fs.readFileSync('comments.json', 'utf8'));
      
            const activeFiles = new Set(
              comments
                .filter(c => c.path && !c.path.includes("test"))
                .map(c => c.path)
            );
      
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open"
            });
      
            for (const issue of existing.data) {
              if (!issue.title.startsWith("[QA] Issues en ")) continue;
      
              const file = issue.title.replace("[QA] Issues en ", "");
      
              if (!activeFiles.has(file)) {
                console.log(`Closing issue for ${file}`);
      
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: "closed"
                });
              }
            }
